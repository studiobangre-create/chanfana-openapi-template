                    type: string
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                payoutId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                status: REJECTED
                failureReason:
                  failureCode: AUTHENTICATION_ERROR
                  failureMessage: The API token in the request is invalid.
        '403':
          description: Authorization failure. Please check your authentication token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  payoutId:
                    type: string
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                payoutId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                status: REJECTED
                failureReason:
                  failureCode: AUTHORISATION_ERROR
                  failureMessage: >-
                    The API token in the request is not authorised for this
                    endpoint.
        '500':
          description: An unknown failure has occured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                failureReason:
                  failureCode: UNKNOWN_ERROR
                  failureMessage: Unable to process request due to an unknown problem.
      tags:
        - payouts
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  amount:
                    type: string
                    format: utc-millisec
                  currency:
                    type: string
                  payoutId:
                    type: string
                  recipient:
                    type: object
                    properties:
                      type:
                        type: string
                      accountDetails:
                        type: object
                        properties:
                          provider:
                            type: string
                          phoneNumber:
                            type: string
                            format: utc-millisec
                  customerMessage:
                    type: string
                  metadata:
                    type: array
                    items:
                      type: object
                      properties:
                        orderId:
                          type: string
            example:
              - amount: '15'
                currency: ZMW
                payoutId: '{{generatedUUID}}'
                recipient:
                  type: MMO
                  accountDetails:
                    provider: MTN_MOMO_ZMB
                    phoneNumber: '260763456789'
                customerMessage: Note of 4 to 22 chars
                metadata:
