openapi: 3.0.0
info:
  title: pawaPay Merchant API V2
  version: 1.0.0
  description: Please find complete documentation from https://docs.pawapay.io/.
servers:
  - url: https://api.sandbox.pawapay.io
paths:
  /v2/deposits:
    post:
      summary: Initiate deposit
      parameters:
        - name: Content-Digest
          in: header
          schema:
            type: string
          example: quis minim
        - name: Signature
          in: header
          schema:
            type: string
          example: culpa Excepteur
        - name: Signature-Input
          in: header
          schema:
            type: string
          example: aute adipisicing qui esse
        - name: Accept-Signature
          in: header
          schema:
            type: string
          example: eu exercitation
        - name: Accept-Digest
          in: header
          schema:
            type: string
          example: exercitation ea in laboris
      responses:
        '200':
          description: ACCEPTED
          content:
            application/json:
              schema:
                type: object
                properties:
                  depositId:
                    type: string
                  status:
                    type: string
                  created:
                    type: string
                    format: date-time
              example:
                depositId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                status: ACCEPTED
                created: '2020-10-19T11:17:01Z'
        '400':
          description: INVALID_INPUT
          content:
            application/json:
              schema:
                type: object
                properties:
                  depositId:
                    type: string
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                depositId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                status: REJECTED
                failureReason:
                  failureCode: INVALID_INPUT
                  failureMessage: >-
                    We are unable to parse the body of the request. Please
                    consult API documentation for valid request payload.
        '401':
          description: >-
            Authentication failed. Make sure you have added the API token into
            the header. If using signatures, make sure they are valid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  depositId:
                    type: string
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                depositId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                status: REJECTED
                failureReason:
                  failureCode: AUTHENTICATION_ERROR
                  failureMessage: The API token in the request is invalid.
        '403':
          description: Authorization failure. Please check your authentication token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  depositId:
                    type: string
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                depositId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                status: REJECTED
                failureReason:
                  failureCode: AUTHORISATION_ERROR
                  failureMessage: >-
                    The API token in the request is not authorised for this
                    endpoint.
        '500':
          description: An unknown failure has occured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  depositId:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                depositId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                failureReason:
                  failureCode: UNKNOWN_ERROR
                  failureMessage: Unable to process request due to an unknown problem.
      tags:
        - deposits
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: string
                  format: utc-millisec
                currency:
                  type: string
                depositId:
                  type: string
                payer:
                  type: object
                  properties:
                    type:
                      type: string
                    accountDetails:
                      type: object
                      properties:
                        provider:
                          type: string
                        phoneNumber:
                          type: string
                          format: utc-millisec
                preAuthorisationCode:
                  type: string
                clientReferenceId:
                  type: string
                customerMessage:
                  type: string
                metadata:
                  type: array
                  items:
                    type: object
                    properties:
                      orderId:
                        type: string
            example:
              amount: '15'
              currency: ZMW
              depositId: '{{generatedUUID}}'
              payer:
                type: MMO
                accountDetails:
                  provider: MTN_MOMO_ZMB
                  phoneNumber: '260763456789'
              preAuthorisationCode: 3c
              clientReferenceId: INV-123456
              customerMessage: Note of 4 to 22 chars
              metadata:
                - orderId: ORD-123456789
                - customerId: customer@email.com
                  isPII: true
  /v2/deposits/{depositId}:
    get:
      summary: Check deposit status
      responses:
        '200':
          description: COMPLETED
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      depositId:
                        type: string
                      status:
                        type: string
                      amount:
                        type: string
                        format: utc-millisec
                      currency:
                        type: string
                      country:
                        type: string
                      payer:
                        type: object
                        properties:
                          type:
                            type: string
                          accountDetails:
                            type: object
                            properties:
                              phoneNUmber:
                                type: string
                                format: utc-millisec
                              provider:
                                type: string
                      customerMessage:
                        type: string
                      clientReferenceId:
                        type: string
                      created:
                        type: string
                        format: date-time
                      providerTransactionId:
                        type: string
                        format: utc-millisec
                      metadata:
                        type: object
                        properties:
                          orderId:
                            type: string
                          customerId:
                            type: string
                            format: email
              example:
                status: FOUND
                data:
                  depositId: 8917c345-4791-4285-a416-62f24b6982db
                  status: COMPLETED
                  amount: '123.00'
                  currency: ZMW
                  country: ZMB
                  payer:
                    type: MMO
                    accountDetails:
                      phoneNUmber: '260763456789'
                      provider: MTN_MOMO_ZMB
                  customerMessage: To ACME company
                  clientReferenceId: REF-987654321
                  created: '2020-10-19T08:17:01Z'
                  providerTransactionId: '12356789'
                  metadata:
                    orderId: ORD-123456789
                    customerId: customer@email.com
        '401':
          description: >-
            Authentication failed. Make sure you have added the API token into
            the header. If using signatures, make sure they are valid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                status: REJECTED
                failureReason:
                  failureCode: AUTHENTICATION_ERROR
                  failureMessage: The API token in the request is invalid.
        '403':
          description: Authorization failure. Please check your authentication token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                status: REJECTED
                failureReason:
                  failureCode: AUTHORISATION_ERROR
                  failureMessage: >-
                    The API token in the request is not authorised for this
                    endpoint.
        '500':
          description: An unknown failure has occured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                failureReason:
                  failureCode: UNKNOWN_ERROR
                  failureMessage: Unable to process request due to an unknown problem.
      tags:
        - deposits
    parameters:
      - name: depositId
        in: path
        required: true
        description: >-
          (Required) The id of the deposit that you are performing this
          operation on.
        schema:
          type: string
        example: '{{lastDepositId}}'
  /v2/deposits/resend-callback/{depositId}:
    post:
      summary: Resend deposit callback
      responses:
        '200':
          description: ACCEPTED
          content:
            application/json:
              schema:
