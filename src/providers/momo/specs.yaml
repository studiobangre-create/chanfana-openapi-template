  /v2/payouts/bulk:
    post:
      summary: Initiate bulk payouts
      parameters:
        - name: Content-Digest
          in: header
          schema:
            type: string
          example: quis minim
        - name: Signature
          in: header
          schema:
            type: string
          example: culpa Excepteur
        - name: Signature-Input
