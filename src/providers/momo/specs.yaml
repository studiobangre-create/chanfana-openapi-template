              schema:
                type: object
                properties:
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                status: REJECTED
                failureReason:
                  failureCode: AUTHENTICATION_ERROR
                  failureMessage: The API token in the request is invalid.
        '403':
          description: Authorization failure. Please check your authentication token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                status: REJECTED
                failureReason:
                  failureCode: AUTHORISATION_ERROR
                  failureMessage: >-
                    The API token in the request is not authorised for this
                    endpoint.
        '500':
          description: An unknown failure has occured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  failureReason:
                    type: object
                    properties:
                      failureCode:
                        type: string
                      failureMessage:
                        type: string
              example:
                failureReason:
                  failureCode: UNKNOWN_ERROR
                  failureMessage: Unable to process request due to an unknown problem.
      tags:
        - deposits
    parameters:
      - name: depositId
        in: path
        required: true
        description: >-
          (Required) The id of the deposit that you are performing this
          operation on.
        schema:
          type: string
        example: '{{lastDepositId}}'
  /v2/checkouts:
    post:
      summary: Initiate checkout
      responses: {}
      tags:
        - checkouts
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                checkoutId:
                  type: string
                returnUrl:
                  type: string
                  format: uri
                returnMethod:
                  type: string
                defaultLanguage:
                  type: string
                reason:
                  type: object
                  properties:
                    en:
                      type: string
                countries:
                  type: array
                  items:
                    type: string
                amounts:
                  type: array
                  items:
                    type: object
                    properties:
                      country:
                        type: string
                      currency:
                        type: string
                      amount:
                        type: string
                        format: utc-millisec
                clientReferenceId:
                  type: string
                metadata:
                  type: array
                  items:
                    type: object
                    properties:
                      orderId:
                        type: string
            example:
              checkoutId: '{{generatedUUID}}'
              returnUrl: https://merchant.example.com/checkout-result
              returnMethod: INSTANT
              defaultLanguage: en
              reason:
                en: GOODS PURCHASE
              countries:
                - ZMB
              amounts:
                - country: ZMB
                  currency: ZMW
                  amount: '15'
              clientReferenceId: INV-123456
              metadata:
                - orderId: ORD-123456789
                - customerId: customer@email.com
                  isPII: true
  /v2/checkouts/{checkoutId}:
    get:
      summary: Check checkout status
      responses: {}
      tags:
        - checkouts
    parameters:
      - name: checkoutId
        in: path
        required: true
        description: >-
          (Required) The id of the checkout that you are performing this
          operation on.
        schema:
          type: string
        example: '{{lastCheckoutId}}'
  /v2/checkouts/{checkoutId}/expire:
    post:
      summary: Expire checkout
      responses: {}
      tags:
        - checkouts
    parameters:
      - name: checkoutId
        in: path
        required: true
        description: >-
          (Required) The id of the checkout that you are performing this
          operation on.
        schema:
          type: string
        example: '{{lastCheckoutId}}'
  /v2/checkouts/resend-callback/{checkoutId}:
    post:
      summary: Resend checkout callback
      responses: {}
      tags:
        - checkouts
    parameters:
      - name: checkoutId
        in: path
        required: true
        description: >-
          (Required) The id of the checkout that you are performing this
          operation on.
        schema:
          type: string
        example: '{{lastCheckoutId}}'
