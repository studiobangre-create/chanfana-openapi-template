            type: string
          example: eu exercitation
        - name: Accept-Digest
          in: header
          schema:
            type: string
          example: exercitation ea in laboris
      responses:
        '200':
          description: Request has been processed by pawaPay
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    payoutId:
                      type: string
                    status:
                      type: string
                    created:
                      type: string
                      format: date-time
              example:
                - payoutId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                  status: ACCEPTED
                  created: '2020-10-19T11:17:01Z'
                - payoutId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                  status: DUPLICATE_IGNORED
                  created: '2020-10-19T10:22:49Z'
                - payoutId: f4401bd2-1568-4140-bf2d-eb77d2b2b639
                  status: REJECTED
                  failureReason:
                    failureCode: AMOUNT_TOO_LARGE
                    failureMessage: Amount should not be greater than 1000
        '400':
          description: INVALID_INPUT
          content:
            application/json:
              schema:
